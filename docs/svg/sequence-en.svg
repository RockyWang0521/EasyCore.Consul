<svg xmlns="http://www.w3.org/2000/svg" width="980" height="400" viewBox="0 0 980 400">
  <rect width="980" height="400" rx="16" fill="#0f1419"/>
  <text x="40" y="40" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="18" font-weight="700">Service Lifecycle Ś Register / Discover / Invoke</text>

  <rect x="30" y="80" width="150" height="78" rx="10" fill="#243044" stroke="#3d9cf0"/>
  <text x="105" y="112" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13" font-weight="700">1. Bind config</text>
  <text x="105" y="134" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="11">ConsulOptions</text>

  <rect x="205" y="80" width="150" height="78" rx="10" fill="#243044" stroke="#3d9cf0"/>
  <text x="280" y="112" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13" font-weight="700">2. Validate</text>
  <text x="280" y="134" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="11">ValidateOnStart</text>

  <rect x="380" y="80" width="150" height="78" rx="10" fill="#243044" stroke="#3ecf8e"/>
  <text x="455" y="112" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13" font-weight="700">3. Register</text>
  <text x="455" y="134" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="11">HostedService</text>

  <rect x="555" y="80" width="150" height="78" rx="10" fill="#243044" stroke="#f0b429"/>
  <text x="630" y="112" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13" font-weight="700">4. Health check</text>
  <text x="630" y="134" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="11">HTTP Check</text>

  <rect x="730" y="80" width="150" height="78" rx="10" fill="#243044" stroke="#3ecf8e"/>
  <text x="805" y="112" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13" font-weight="700">5. Deregister</text>
  <text x="805" y="134" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="11">StopAsync</text>

  <path d="M180 119 H205" stroke="#8fa3bc" stroke-width="2"/>
  <path d="M355 119 H380" stroke="#8fa3bc" stroke-width="2"/>
  <path d="M530 119 H555" stroke="#8fa3bc" stroke-width="2"/>
  <path d="M705 119 H730" stroke="#8fa3bc" stroke-width="2"/>

  <rect x="80" y="210" width="820" height="140" rx="12" fill="#1a2332" stroke="#2f3f55"/>
  <text x="490" y="245" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="14" font-weight="700">Runtime call chain (IConsulServer)</text>
  <text x="490" y="278" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="13">Health.Service(passingOnly) -&gt; LoadBalancer -&gt; HttpClient -&gt; Downstream API</text>
  <text x="490" y="308" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="12">RoundRobin / Random Ę per-request Bearer Ę System.Text.Json</text>
  <text x="490" y="332" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="12">KV: IConsulCache Ę Lock: Session + Acquire/Release + TTL renew</text>
</svg>
