  <text x="690" y="185" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="11">Gateway + Consul</text>

  <path d="M260 170 H340" stroke="#f0b429" stroke-width="2"/>
  <path d="M260 215 H340" stroke="#3ecf8e" stroke-width="2"/>
  <path d="M520 170 H600" stroke="#3d9cf0" stroke-width="2"/>

