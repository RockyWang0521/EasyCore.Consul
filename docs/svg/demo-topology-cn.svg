<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
  </defs>
  <rect width="980" height="360" rx="16" fill="url(#bg)"/>
  <text x="40" y="40" fill="#e8eef7" font-family="Segoe UI, Microsoft YaHei, Arial" font-size="18" font-weight="700">Demo Topology</text>
  <text x="40" y="64" fill="#8fa3bc" font-family="Segoe UI, Microsoft YaHei, Arial" font-size="12">Local Consul :8500 ? three sample processes</text>

  <rect x="60" y="110" width="200" height="120" rx="12" fill="#243044" stroke="#f0b429" stroke-width="2"/>
  <text x="160" y="155" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="15" font-weight="700">Consul</text>
  <text x="160" y="180" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="12">http://127.0.0.1:8500</text>
  <text x="160" y="202" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Microsoft YaHei, Arial" font-size="12">Catalog / Health / KV</text>

  <rect x="340" y="90" width="180" height="70" rx="10" fill="#243044" stroke="#3d9cf0"/>
  <text x="430" y="118" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13" font-weight="700">Web.Consul</text>
  <text x="430" y="140" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="11">:5057 ? KV / Lock / Invoke</text>

  <rect x="340" y="180" width="180" height="70" rx="10" fill="#243044" stroke="#3ecf8e"/>
  <text x="430" y="208" text-anchor="middle" fill="#e8eef7" font-family="Segoe UI, Arial" font-size="13" font-weight="700">Web.Consul.Server</text>
  <text x="430" y="230" text-anchor="middle" fill="#8fa3bc" font-family="Segoe UI, Arial" font-size="11">:5058 ? Downstream API</text>

  <rect x="600" y="135" width="180" height="70" rx="10" fill="#243044" stroke="#3d9cf0"/>
